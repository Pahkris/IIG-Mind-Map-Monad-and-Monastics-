
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SeTs Ryu - Monad Explorer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
      font-family: 'Inter', sans-serif;
    }
    .font-mystic {
      font-family: 'Cinzel', serif;
    }
    /* Enhanced Wormhole effect */
    @keyframes wormhole-tunnel {
      0% { transform: scale(0) rotate(0deg); opacity: 0; border-width: 0px; }
      20% { opacity: 1; border-width: 4px; }
      100% { transform: scale(8) rotate(720deg); opacity: 0; border-width: 1px; }
    }
    .wormhole-layer {
      position: absolute;
      border: 2px solid rgba(59, 130, 246, 0.5);
      border-radius: 50%;
      animation: wormhole-tunnel 0.8s ease-in forwards;
    }
    .wormhole-layer:nth-child(2) { animation-delay: 0.1s; border-color: rgba(245, 166, 35, 0.4); }
    .wormhole-layer:nth-child(3) { animation-delay: 0.2s; border-color: rgba(255, 255, 255, 0.3); }

    /* Persistent Hyperwarp Streaks */
    @keyframes hyperwarp {
      0% { transform: translateZ(0) scale(1); opacity: 0; }
      50% { opacity: 1; }
      100% { transform: translateZ(1000px) scale(2); opacity: 0; }
    }
    .warp-streak {
      position: absolute;
      width: 2px;
      height: 100px;
      background: linear-gradient(to bottom, transparent, rgba(59, 130, 246, 0.8), white);
      opacity: 0;
      pointer-events: none;
    }

    /* Gentle Pulse for AI Master */
    @keyframes gentle-glow {
      0%, 100% { transform: scale(1); box-shadow: 0 0 20px rgba(245, 166, 35, 0.3); }
      50% { transform: scale(1.05); box-shadow: 0 0 40px rgba(245, 166, 35, 0.6); }
    }
    .animate-gentle-glow {
      animation: gentle-glow 4s ease-in-out infinite;
    }

    /* Energy Flow Animation for Relational Links */
    @keyframes energy-flow {
      from { stroke-dashoffset: 40; }
      to { stroke-dashoffset: 0; }
    }
    .link-energy {
      animation: energy-flow var(--flow-speed, 1s) linear infinite;
    }

    /* Custom scrollbar for info cards */
    .custom-scrollbar::-webkit-scrollbar {
      width: 4px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: rgba(59, 130, 246, 0.3);
      border-radius: 10px;
    }

    /* Glass Slider styling */
    input[type=range] {
      -webkit-appearance: none;
      background: transparent;
    }
    input[type=range]::-webkit-slider-runnable-track {
      width: 100%;
      height: 4px;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    input[type=range]::-webkit-slider-thumb {
      height: 16px;
      width: 16px;
      border-radius: 50%;
      background: #F5A623;
      cursor: pointer;
      -webkit-appearance: none;
      margin-top: -7px;
      box-shadow: 0 0 10px rgba(245, 166, 35, 0.8);
      border: 2px solid white;
    }
  </style>
<script type="importmap">
{
  "imports": {
    "recharts": "https://esm.sh/recharts@^3.6.0",
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/"
  }
}
</script>
</head>
<body>
  <div id="root"></div>
</body>
</html>
