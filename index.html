<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SeTs Ryu - Monad Explorer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
      font-family: 'Inter', sans-serif;
    }
    .font-mystic {
      font-family: 'Cinzel', serif;
    }
    
    @keyframes hyperwarp-streak-anim {
      0% { transform: translate3d(0, 0, -1200px) scaleZ(0.1); opacity: 0; }
      20% { opacity: 1; }
      100% { transform: translate3d(var(--tx), var(--ty), 1800px) scaleZ(12); opacity: 0; }
    }
    .warp-trail-streak {
      position: absolute;
      width: 2px;
      height: 300px;
      background: linear-gradient(to top, transparent, var(--color), white);
      border-radius: 100px;
      pointer-events: none;
      transform-style: preserve-3d;
      animation: hyperwarp-streak-anim 0.75s ease-in forwards;
    }

    @keyframes gentle-glow {
      0%, 100% { transform: scale(1); box-shadow: 0 0 20px rgba(245, 166, 35, 0.3); }
      50% { transform: scale(1.05); box-shadow: 0 0 40px rgba(245, 166, 35, 0.6); }
    }
    .animate-gentle-glow {
      animation: gentle-glow 4s ease-in-out infinite;
    }

    .custom-scrollbar::-webkit-scrollbar {
      width: 4px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: rgba(59, 130, 246, 0.3);
      border-radius: 10px;
    }

    input[type=range] {
      -webkit-appearance: none;
      background: transparent;
    }
    input[type=range]::-webkit-slider-runnable-track {
      width: 100%;
      height: 4px;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
    }
    input[type=range]::-webkit-slider-thumb {
      height: 16px;
      width: 16px;
      border-radius: 50%;
      background: #F5A623;
      cursor: pointer;
      -webkit-appearance: none;
      margin-top: -7px;
      box-shadow: 0 0 10px rgba(245, 166, 35, 0.8);
      border: 2px solid white;
    }
  </style>
<script type="importmap">
{
  "imports": {
    "recharts": "https://esm.sh/recharts@^3.6.0",
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/"
  }
}
</script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/monad/index.tsx"></script>
</body>
</html>
